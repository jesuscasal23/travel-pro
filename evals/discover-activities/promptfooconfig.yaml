description: "Discover Activities — prompt quality evaluation"

commandLineOptions:
  envPath:
    - ../../.env.local

prompts:
  - file://prompt-function.js

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      temperature: 0.7
      max_tokens: 8000

defaultTest:
  assert:
    - type: javascript
      value: file://assertions.js:isValidJson
    - type: javascript
      value: file://assertions.js:matchesZodSchema
    - type: javascript
      value: file://assertions.js:hasNoDuplicateSubTypes
    - type: javascript
      value: file://assertions.js:hasCategoryCoverage
    - type: javascript
      value: file://assertions.js:hasSpecificVenueNames
    - type: javascript
      value: file://assertions.js:hasMinActivityCount

tests:
  - description: "Bangkok backpacker — temples, markets, nightlife dedup"
    vars:
      fixtureId: bangkok-backpacker

  - description: "Paris luxury couple — fine dining venue quality"
    vars:
      fixtureId: paris-luxury

  - description: "Tokyo family — category diversity, family-friendly"
    vars:
      fixtureId: tokyo-family

  - description: "Ljubljana small city — can it find 20+ real places?"
    vars:
      fixtureId: ljubljana-small

  - description: "Berlin nightlife — niche interests but category spread"
    vars:
      fixtureId: berlin-nightlife

  - description: "Queenstown adventure — outdoor venue realism"
    vars:
      fixtureId: queenstown-adventure
